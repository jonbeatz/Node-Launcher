name: CI
on: [push, pull_request]

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint (renderer)
        run: npm run lint
      - name: Typecheck (renderer)
        run: npm run typecheck
      - name: Syntax check (main process + preload)
        run: |
          set -e
          for f in src/main/main.js src/main/vpe-ipc.js src/preload/preload.js src/main/lib/logger.js src/main/lib/support-bundle.js; do
            node --check "$f"
          done
          for f in src/main/ipc/*.js; do
            node --check "$f"
          done
      - name: SQLite migration guard
        run: npm run test:migrations
      - name: Build Renderer
        run: npm run build:renderer
