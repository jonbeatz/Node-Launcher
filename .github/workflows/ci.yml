name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    # Dev / Electron: launcher UI is http://localhost:3000; managed apps use higher ports.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint renderer
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run lint

      - name: Run renderer build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build:renderer

