name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Read-only token for checkout/actions; forks stay safe.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Mirrors local checks: lint → static renderer export → AST stub → Playwright smoke.
    # `npm ci` requires package-lock.json in sync with package.json (commits must include lock updates).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint renderer
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run lint

      - name: Run renderer build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build:renderer

      - name: AST repair stub
        run: npm run repair:ast

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: E2E smoke (renderer)
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run test:e2e
