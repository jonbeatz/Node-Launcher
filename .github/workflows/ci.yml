name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Dev / Electron: launcher UI is http://127.0.0.1:3000 in CI (Playwright); managed apps use higher ports.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint renderer
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run lint

      - name: Run renderer build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build:renderer

      - name: AST repair stub
        run: npm run repair:ast

      # Chromium needs OS libs on ubuntu-latest; --with-deps avoids launch failures in headless CI.
      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: E2E smoke (renderer)
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run test:e2e

